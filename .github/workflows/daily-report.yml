name: 忆蚀 Subliminal 玩家舆情日报

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式（不发送真实邮件）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-and-send-report:
    name: 生成并发送舆情日报
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 安装依赖
        run: pip install -r requirements.txt

      - name: 🚀 运行舆情日报脚本
        env:
          DEEPSEEK_API_KEY:        ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_SENDER_EMAIL:      ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT_EMAIL:  ${{ secrets.REPORT_RECIPIENT_EMAIL }}
          TEST_MODE:               ${{ inputs.test_mode || 'false' }}
        run: python scripts/daily_report.py

      - name: 🔔 失败通知
        if: failure()
        run: |
          echo "❌ 日报任务失败，请检查 Actions 日志排查原因"
